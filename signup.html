<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Judson&display=swap" rel="stylesheet">
    <link rel="icon" href="LOGO.png">
    <link rel="stylesheet" href="stylesignup.css">
</head>
<body>

    <section>
        <div class="imgBg">
            <img src="teamwork.jpg" alt="">
        </div>
        <div class="content">
            <div class="form">
                <a href="index.html"><img src="x.png" alt="" class="xlogo"></a>
                <h2>SIGN UP</h2>
                <div class="navbarsg">
                    <img src="LOGO.png" alt="" class = "logo">
                </div>
                <form action="" id="form">
                    <div class="input">
                        <span>First Name</span>
                        <input type="text" name="fname" placeholder="Enter your first name" id="firstname">
                        <div class="error"></div>
                    </div>
                    <div class="input">
                        <span>Last Name</span>
                        <input type="text" name="lname" placeholder="Enter your last name" id="lastname">
                        <div class="error"></div>
                    </div>
                    <div class="input">
                        <span>Email Address</span>
                        <input type="email" name="email" placeholder="Enter your email address" id="email">
                        <div class="error"></div>
                    </div>
                    <div class="input">
                        <span>Password</span>
                        <input type="password" name="password" placeholder="Enter your password" id="password">
                        <div class="error"></div>
                    </div>
                    <div class="input">
                        <span>Confirmation Password</span>
                        <input type="password" name="confpass" placeholder="Enter your confirmation password" id="confpass">
                        <div class="error"></div>
                    </div>
                    <div class="terms">
                        <p>By continuing, you agree to accept our <span style="color: #4187F0;">TERMS</span> and <span style="color: #4187F0;">PRIVACY POLICY</span></p>
                    </div>
                        <!-- <input type="submit" value="Sign Up"> -->
                    <!-- <a href="companypage.html"> -->
                        <button type="submit">Sign Up</button>
                    <!-- </a> -->
                    <div class="input">
                        <p class="account">Already have an account? <a href="signin.html">Sign in</a></p>
                    </div>

                </form>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
